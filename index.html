<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Reaktionsjäger</title>
 
    <style>
        * {
            box-sizing: border-box;
        }
 
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(150deg, #111827, #1d4ed8);
        }
 
        .spiel {
            width: min(950px, 94vw);
        }
 
        .spiel-layout {
            display: grid;
            grid-template-columns: 170px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }
 
        .modus-panel {
            display: grid;
            gap: 10px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
 
        .modus-panel h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
        }
 
        .modus-button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
 
        .modus-button:hover,
        .modus-button.active {
            background: #2563eb;
            transform: translateY(-1px);
        }
 
        .spiel-panel {
            display: grid;
            gap: 16px;
        }
 
        h1,
        .untertitel {
            text-align: center;
        }
 
        .anzeigen {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
 
        .karte {
            padding: 14px;
            text-align: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.14);
        }
 
        .wert {
            display: block;
            margin-top: 6px;
            font-size: 2rem;
            font-weight: bold;
        }
 
        #spielfeld {
            position: relative;
            height: 420px;
            overflow: hidden;
            border: 3px solid white;
            border-radius: 18px;
            background: #0f172a;
        }
 
        #ziel {
            position: absolute;
            left: 50%;
            top: 50%;
 
            width: 80px;
            height: 80px;
 
            transform: translate(-50%, -50%) scale(var(--ziel-scale, 1));
 
            border: none;
            border-radius: 50%;
 
            background: #22c55e;
            box-shadow: 0 0 30px #22c55e;
 
            cursor: pointer;
            display: none;
        }
 
        .bombe {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: none;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #222222 0%, #000000 65%, #111111 100%);
            display: none;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(0, 0, 0, 0.7);
        }
 
        .bombe::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 46%;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 35% 35%, #999999 0%, #444444 55%, #111111 100%);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
        }
 
        .bombe::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 10%;
            width: 6px;
            height: 16px;
            transform: translate(-50%, 0) rotate(-20deg);
            background: linear-gradient(180deg, #fde047 0%, #f59e0b 100%);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(253, 224, 71, 0.8);
        }
 
        .steuerung {
            margin-top: 16px;
            text-align: center;
        }
 
        #start {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
 
            font-size: 1rem;
            font-weight: bold;
 
            background: #facc15;
            color: #111827;
 
            cursor: pointer;
        }
 
        #meldung {
            min-height: 28px;
            text-align: center;
            font-weight: bold;
        }
 
        @media (max-width: 600px) {
            .anzeigen {
                grid-template-columns: 1fr;
            }
 
            #spielfeld {
                height: 350px;
            }
        }
 
        #ziel {
            transition: box-shadow 0.2s ease;
            transform: translate(-50%, -50%) scale(var(--ziel-scale, 1));
        }
 
        #ziel.hit {
            animation: treffen 0.3s ease;
        }
 
        @keyframes treffen {
            0% {
                transform: translate(-50%, -50%) scale(var(--ziel-scale, 1));
            }
            50% {
                transform: translate(-50%, -50%) scale(calc(var(--ziel-scale, 1) * 1.4));
            }
            100% {
                transform: translate(-50%, -50%) scale(var(--ziel-scale, 1));
            }
        }
 
        #feuerwerk {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            display: none;
        }
 
        #feuerwerk.active {
            display: block;
        }
 
        #feuerwerk span {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            opacity: 0;
            background: radial-gradient(circle, white 0%, rgba(255, 255, 255, 0.9) 35%, transparent 70%);
            animation: explode 1s ease-out forwards;
        }
 
        @keyframes explode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0.3);
            }
        }
</style>
</head>
 
<body>
<main class="spiel">
<h1>Reaktionsjäger</h1>
 
        <p class="untertitel">
            Triff den grünen Kreis so oft wie möglich.
</p>
 
        <section class="anzeigen">
            <div class="karte">
                Punkte
                <span id="punkte" class="wert">0</span>
            </div>
            <div class="karte">
                Zeit
                <span id="zeit" class="wert">0</span>
            </div>
            <div class="karte">
                Rekord
                <span id="rekord" class="wert">0</span>
            </div>
        </section>
 
        <div class="spiel-layout">
            <aside class="modus-panel">
                <h2>Schwierigkeit</h2>
                <button class="modus-button active" data-modus="warmup">Warm Up</button>
                <button class="modus-button" data-modus="anfänger">Anfänger</button>
                <button class="modus-button" data-modus="mittel">Mittel</button>
                <button class="modus-button" data-modus="schwer">Hart</button>
            </aside>
 
            <div class="spiel-panel">
                <section id="spielfeld">
                    <button id="ziel" aria-label="Ziel"></button>
                    <button class="bombe" aria-label="Bombe"></button>
                    <button class="bombe" aria-label="Bombe"></button>
                    <button class="bombe" aria-label="Bombe"></button>
                    <div id="feuerwerk" aria-hidden="true"></div>
                </section>
 
                <div class="steuerung">
                    <button id="start">Spiel starten</button>
                </div>
            </div>
        </div>
 
        <p id="meldung">Bereit?</p>
</main>
 
    <script>
        const spielfeld = document.getElementById("spielfeld");
        const ziel = document.getElementById("ziel");
        const bomben = Array.from(document.querySelectorAll(".bombe"));
        const startTaste = document.getElementById("start");
        const feuerwerkContainer = document.getElementById("feuerwerk");
 
        const punkteAnzeige = document.getElementById("punkte");
        const zeitAnzeige = document.getElementById("zeit");
        const rekordAnzeige = document.getElementById("rekord");
        const meldung = document.getElementById("meldung");
        const modusButtons = Array.from(document.querySelectorAll(".modus-button"));
 
        let punkte = 0;
        let spielRestzeit = null;
        let zielRestzeit = null;
        let spielLaeuft = false;
        let zielTimerId = null;
        let spielTimerId = null;
        let rekord = 0;
        let bombenAktiv = false;
        let modus = "warmup";
 
        const modusConfig = {
            warmup: { label: "Warm Up", zielzeit: null, spielDauer: null },
            anfänger: { label: "Anfänger", zielzeit: 1.9, spielDauer: 20 },
            mittel: { label: "Mittel", zielzeit: 0.9, spielDauer: 20 },
            schwer: { label: "Schwer", zielzeit: 0.6, spielDauer: 20 },
        };
 
        function anzeigeAktualisieren() {
            punkteAnzeige.textContent = punkte;
            zeitAnzeige.textContent = spielRestzeit === null ? "∞" : spielRestzeit;
            rekordAnzeige.textContent = rekord;
        }
 
        function setModus(name) {
            modus = name;
            modusButtons.forEach((button) => {
                button.classList.toggle("active", button.dataset.modus === name);
            });
            meldung.textContent = `Modus: ${modusConfig[name].label}`;
            resetGame();
        }
 
        function resetGame() {
            spielLaeuft = false;
            clearTargetTimer();
            clearGameTimer();
            punkte = 0;
            bombenAktiv = false;
            ziel.style.display = "none";
            versteckeBomben();
            spielRestzeit = modusConfig[modus].spielDauer;
            zielRestzeit = modusConfig[modus].zielzeit === null ? null : Math.round(modusConfig[modus].zielzeit * 1000);
            startTaste.disabled = false;
            anzeigeAktualisieren();
        }
 
        function clearTargetTimer() {
            if (zielTimerId !== null) {
                clearInterval(zielTimerId);
                zielTimerId = null;
            }
        }
 
        function clearGameTimer() {
            if (spielTimerId !== null) {
                clearInterval(spielTimerId);
                spielTimerId = null;
            }
        }
 
        function platziereElementZufall(element, elementGroesse) {
            const box = spielfeld.getBoundingClientRect();
            const half = elementGroesse / 2;
            const maxX = box.width - elementGroesse;
            const maxY = box.height - elementGroesse;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            element.style.left = `${x + half}px`;
            element.style.top = `${y + half}px`;
        }
 
        function zielBewegen() {
            const neueGroesse = Math.floor(35 + Math.random() * 35);
            ziel.style.width = `${neueGroesse}px`;
            ziel.style.height = `${neueGroesse}px`;
            ziel.style.setProperty("--ziel-scale", "1");
            platziereElementZufall(ziel, neueGroesse);
        }
 
        function startTargetTimer() {
            clearTargetTimer();
            if (modusConfig[modus].zielzeit === null) {
                zielRestzeit = null;
                return;
            }
 
            zielRestzeit = Math.round(modusConfig[modus].zielzeit * 1000);
            zielTimerId = setInterval(() => {
                if (!spielLaeuft) {
                    clearTargetTimer();
                    return;
                }
                zielRestzeit -= 100;
                if (zielRestzeit <= 0) {
                    zielVerpasst();
                }
            }, 100);
        }
 
        function startGameTimer() {
            clearGameTimer();
            if (modusConfig[modus].spielDauer === null) {
                spielRestzeit = null;
                anzeigeAktualisieren();
                return;
            }
 
            spielRestzeit = modusConfig[modus].spielDauer;
            anzeigeAktualisieren();
            spielTimerId = setInterval(() => {
                if (!spielLaeuft) {
                    clearGameTimer();
                    return;
                }
 
                spielRestzeit -= 1;
                anzeigeAktualisieren();
                if (spielRestzeit <= 0) {
                    spielBeenden();
                }
            }, 1000);
        }
 
        function zielVerpasst() {
            clearTargetTimer();
            meldung.textContent = "Zu langsam! Der Kreis wird neu gesetzt.";
            zielBewegen();
            versteckeBomben();
            if (Math.random() < 0.35) {
                zeigeBomben();
            }
            if (modusConfig[modus].zielzeit !== null) {
                startTargetTimer();
            }
        }
 
        function bewegeBomben() {
            bomben.forEach((bombe) => {
                const bombenGroesse = 28 + Math.floor(Math.random() * 14);
                bombe.style.width = `${bombenGroesse}px`;
                bombe.style.height = `${bombenGroesse}px`;
                platziereElementZufall(bombe, bombenGroesse);
            });
        }
 
        function zeigeBomben() {
            const aktiveBombe = bomben[Math.floor(Math.random() * bomben.length)];
            bomben.forEach((bombe) => {
                bombe.style.display = bombe === aktiveBombe ? "block" : "none";
            });
            bombenAktiv = true;
            bewegeBomben();
        }
 
        function versteckeBomben() {
            bomben.forEach((bombe) => {
                bombe.style.display = "none";
            });
            bombenAktiv = false;
        }
 
        function spieleStartWieder() {
            punkte = 0;
            spielLaeuft = true;
            bombenAktiv = false;
 
            spielRestzeit = modusConfig[modus].spielDauer;
            zielRestzeit = modusConfig[modus].zielzeit === null ? null : Math.round(modusConfig[modus].zielzeit * 1000);
            anzeigeAktualisieren();
            meldung.textContent = "Los! Klicke auf den Kreis.";
            startTaste.disabled = true;
            ziel.style.display = "block";
            versteckeBomben();
            zielBewegen();
            if (modusConfig[modus].spielDauer !== null) {
                startGameTimer();
            }
            startTargetTimer();
        }
 
        function spielStarten() {
            if (spielLaeuft) {
                return;
            }
            spieleStartWieder();
        }
 
        function spielBeenden() {
            spielLaeuft = false;
            clearTargetTimer();
            clearGameTimer();
            ziel.style.display = "none";
            versteckeBomben();
            startTaste.disabled = false;
            anzeigeAktualisieren();
 
            if (punkte > rekord) {
                rekord = punkte;
                meldung.textContent = `Neuer Rekord! ${punkte} Punkte.`;
                erscheinFeuerwerk();
            } else {
                meldung.textContent = `Spiel beendet. Du hast ${punkte} Punkte erreicht.`;
            }
        }
 
        function erscheinFeuerwerk() {
            feuerwerkContainer.innerHTML = "";
            const partikel = 14;
            for (let i = 0; i < partikel; i++) {
                const span = document.createElement("span");
                const winkel = Math.random() * Math.PI * 2;
                const distanz = 80 + Math.random() * 70;
                const dx = Math.cos(winkel) * distanz;
                const dy = Math.sin(winkel) * distanz;
                span.style.left = "50%";
                span.style.top = "50%";
                span.style.setProperty("--dx", `${dx.toFixed(0)}px`);
                span.style.setProperty("--dy", `${dy.toFixed(0)}px`);
                span.style.background = ["#fbbf24", "#38bdf8", "#fb7185", "#22c55e"][Math.floor(Math.random() * 4)];
                span.style.animationDelay = `${Math.random() * 0.2}s`;
                feuerwerkContainer.appendChild(span);
            }
            feuerwerkContainer.classList.add("active");
            setTimeout(() => {
                feuerwerkContainer.classList.remove("active");
                feuerwerkContainer.innerHTML = "";
            }, 1200);
        }
 
        ziel.addEventListener("click", function (event) {
            event.stopPropagation();
            if (!spielLaeuft) {
                return;
            }
            punkte++;
            anzeigeAktualisieren();
            meldung.textContent = "Treffer! Punkt erzielt.";
            ziel.classList.remove("hit");
            void ziel.offsetWidth;
            ziel.classList.add("hit");
            zielBewegen();
            versteckeBomben();
            if (Math.random() < 0.35) {
                zeigeBomben();
            }
            if (bombenAktiv) {
                bewegeBomben();
            }
            startTargetTimer();
        });
 
        bomben.forEach((bombe) => {
            bombe.addEventListener("click", function (event) {
                event.stopPropagation();
                if (!spielLaeuft) {
                    return;
                }
                punkte = Math.max(0, punkte - 1);
                anzeigeAktualisieren();
                meldung.textContent = "Autsch! Bombe getroffen – Punkt verloren.";
                versteckeBomben();
                zielBewegen();
                startTargetTimer();
            });
        });
 
        spielfeld.addEventListener("click", function () {
            if (!spielLaeuft) {
                spielStarten();
            }
        });
 
        modusButtons.forEach((button) => {
            button.addEventListener("click", () => setModus(button.dataset.modus));
        });
 
        startTaste.addEventListener("click", spielStarten);
 
        resetGame();
    </script>
</body>
</html>
