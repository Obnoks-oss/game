  <path d="M420 150 L420 100 L525 100 L560 150 Z" fill="#aed6f1" stroke="#2c3e50" stroke-width="3"/>

  <!-- Fenster-Säule -->
  <line x1="410" y1="100" x2="410" y2="150" stroke="#2c3e50" stroke-width="4"/>

  <!-- Stoßstange hinten -->
