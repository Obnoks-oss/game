  <!-- Stoßstange vorne -->
  <rect x="685" y="270" width="30" height="20" rx="5" fill="#e74c3c"/>

  <!-- Scheinwerfer -->
  <rect x="690" y="230" width="15" height="25" rx="3" fill="#f1c40f"/>

  <!-- Rücklicht -->
  <rect x="95" y="230" width="15" height="25" rx="3" fill="#e74c3c"/>

  <!-- Rad hinten -->
  <circle cx="250" cy="290" r="45" fill="#2c3e50"/>
  <circle cx="250" cy="290" r="30" fill="#bdc3c7"/>
  <circle cx="250" cy="290" r="10" fill="#2c3e50"/>

  <!-- Rad vorne -->
  <circle cx="550" cy="290" r="45" fill="#2c3e50"/>
  <circle cx="550" cy="290" r="30" fill="#bdc3c7"/>
  <circle cx="550" cy="290" r="10" fill="#2c3e50"/>

  <!-- Türlinie -->
  <line x1="400" y1="160" x2="400" y2="280" stroke="#2c3e50" stroke-width="2"/>

  <!-- Türgriff hinten -->
